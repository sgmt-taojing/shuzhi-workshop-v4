version: '3.8'

services:
  app:
    build: .
    container_name: shuzhi-workshop
    restart: unless-stopped
    ports:
      - "${PORT:-3004}:3004"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/api/health',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: shuzhi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./admin-web:/usr/share/nginx/html/admin:ro
      - ./wechat-h5:/usr/share/nginx/html/h5:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

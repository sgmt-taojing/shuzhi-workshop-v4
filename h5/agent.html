  else if (page === 'push') loadPush();
}

function openOverlay(title, content, actionHtml) {
  $('#overlayTitle').textContent = title;
  $('#overlayContent').innerHTML = content;
  $('#overlayAction').innerHTML = actionHtml || '';
  $('#overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeOverlay() {
  $('#overlay').classList.remove('active');
  document.body.style.overflow = '';
}
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

async function submitLead() {
  const company = $('#ld-company').value.trim();
  if (!company) { toast('请输入企业名称'); return; }
  const body = {
    agent_id: AGENT_ID,
    agent_name: $('#agentName').textContent.split(' · ')[0],
    company_name: company,
    contact_name: $('#ld-contact').value.trim(),
    contact_phone: $('#ld-phone').value.trim(),
    industry: $('#ld-industry').value.trim(),
    region: $('#ld-region').value.trim(),
    demand_desc: $('#ld-demand').value.trim()
  };
  try {
    const data = await api('/agents/leads', { method: 'POST', body: JSON.stringify(body) });
    if (data.error) { toast(data.error); return; }
    toast('报备成功！保护期至 ' + (data.lock_expire || ''));
    closeOverlay();
    loadLeads();
  } catch(e) { toast('报备失败'); }

        <div class="card-desc">${(r.content || '').slice(0, 80)}...</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">
          ${r.product_title ? '<span class="tag tag-purple">'+r.product_title+'</span>' : ''}
          ${(r.materials||[]).map(m => '<span class="tag tag-blue">'+m+'</span>').join('')}
        </div>
        <div class="card-footer">
          <span style="font-size:11px;color:#9ca3af">${(r.created_at||'').slice(0,10)}</span>
          ${r.read_status ? '<span class="tag tag-green">已读</span>' : '<span class="tag tag-red">未读</span>'}
        </div>
      </div>
    `).join('') || '<div class="empty">暂无推送</div>';
  } catch(e) { el.innerHTML = '<div class="empty">加载失败</div>'; }
}

async function showPushDetail(id) {
  const data = await api('/agents/push/all?agentId=' + AGENT_ID);
  const r = (data.list || []).find(p => p.id === id);
  if (!r) return;
  // 标记已读
  if (!r.read_status) {
    api('/agents/push/' + id + '/read', { method: 'PUT' }).catch(() => {});
  }
  openOverlay('推送详情', `
    <div style="margin-bottom:12px">
      <h2 style="font-size:16px;margin-bottom:6px">${r.title}</h2>
      <div style="font-size:12px;color:#6b7280">${r.product_title || ''} · ${(r.created_at||'').slice(0,16).replace('T',' ')}</div>
    </div>
    <div style="font-size:14px;line-height:1.8;color:#374151;white-space:pre-wrap;margin-bottom:16px">${r.content || ''}</div>
    ${r.materials && r.materials.length ? '<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;margin-bottom:8px">📎 方案素材</div>'+r.materials.map(m => '<div style="background:#f9fafb;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px"><span style="font-size:18px">📄</span><span style="font-size:13px">'+m+'</span></div>').join('')+'</div>' : ''}
  `);
  $('#overlayAction').innerHTML = '<button class="btn btn-primary" onclick="toast(\'素材已申请，总部将尽快发送\')">📧 申请素材</button>';
  $('#overlayAction').style.display = 'block';
  // 刷新列表
  loadPush();
}

// Init
loadDashboard();
</script>
</body>
</html>

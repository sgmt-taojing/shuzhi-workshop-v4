<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="数造工坊·数字化转型一站式服务平台 — 产品库/政策追踪/服务撮合/企业管家/AI诊断">
<meta name="keywords" content="数造工坊,数字化转型,企业服务,产品库,政策追踪,服务撮合,AI诊断,马季粮油">
<meta property="og:title" content="数造工坊 · 数字化转型一站式服务平台">
<meta property="og:description" content="产品库/政策追踪/服务撮合/企业管家/AI诊断">
<meta property="og:type" content="website">
<meta property="og:locale" content="zh_CN">
<meta name="theme-color" content="#2563eb">
<title>数造工坊 · 数字化转型一站式服务平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--bg:#f5f6fa;--card:#fff;--border:#e5e7eb;--text:#1f2937;--text2:#6b7280;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.hidden{display:none!important}
.loading{text-align:center;padding:40px;color:#9ca3af;font-size:13px}.skel{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:skel 1.5s infinite;border-radius:6px}@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}.skel-card{height:80px;margin-bottom:12px;border-radius:10px}.skel-line{height:14px;margin-bottom:8px;border-radius:4px}.skel-line.short{width:60%}
.empty{text-align:center;padding:40px;color:#9ca3af;font-size:13px}html{scroll-behavior:smooth}

/* Header */
.h5-header{background:linear-gradient(135deg,#2563eb,#6366f1);color:#fff;padding:48px 20px 24px;text-align:center;position:relative;overflow:hidden}
.h5-header::after{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;background:rgba(255,255,255,.08);border-radius:50%}
.h5-logo{font-size:22px;font-weight:800;margin-bottom:6px;position:relative;z-index:1}
.h5-slogan{font-size:13px;opacity:.85;position:relative;z-index:1}

/* Nav Tabs */
.nav-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:14px 16px;font-size:14px;color:var(--text2);white-space:nowrap;position:relative;transition:color .2s}
.nav-tab.active{color:var(--primary);font-weight:600}
.nav-tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--primary);border-radius:2px}

/* Pages */
.page{display:none;min-height:60vh}
.page.active{display:block}

/* Cards */
.card{background:#fff;border-radius:12px;margin:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-body{padding:16px}

/* Stats */
.stats-row{display:flex;gap:8px;padding:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stats-row::-webkit-scrollbar{display:none}
.stat-box{flex-shrink:0;background:#fff;border-radius:10px;padding:12px 16px;text-align:center;min-width:90px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-num{font-size:22px;font-weight:700;color:var(--primary)}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}

/* Product Grid */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.prod-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s}
.prod-card:active{transform:scale(.97)}
.prod-icon{height:80px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,#eff6ff,#e0e7ff)}
.prod-info{padding:10px}
.prod-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px}
.prod-sub{font-size:11px;color:var(--text2);margin-bottom:6px}
.prod-price{font-size:16px;font-weight:700;color:var(--danger)}
.prod-tag{display:inline-block;font-size:10px;padding:2px 6px;background:#dbeafe;color:#1e40af;border-radius:3px;margin-right:3px}

/* Policy List */
.policy-item{background:#fff;margin:10px 12px;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer}
.policy-item:active{background:#f9fafb}
.policy-level{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;margin-right:6px;font-weight:600}
.level-national{background:#dbeafe;color:#1e40af}
.level-shandong{background:#d1fae5;color:#059669}
.level-ningxia{background:#fef3c7;color:#92400e}
.policy-title{font-size:14px;font-weight:600;margin:6px 0;color:var(--text)}
.policy-meta{font-size:11px;color:var(--text2)}
.policy-cat{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;background:#f3f4f6;color:#6b7280;margin-right:4px}

/* Filter */
.filter-bar{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border-bottom:1px solid var(--border)}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:6px 14px;font-size:12px;border-radius:16px;background:#f3f4f6;color:var(--text2);cursor:pointer;transition:all .2s}
.filter-chip.active{background:var(--primary);color:#fff}

/* Client Card */
.client-card{background:#fff;margin:10px 12px;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer}
.client-card:active{transform:scale(.98)}
.client-banner{height:60px;background:linear-gradient(135deg,#3b82f6,#6366f1);position:relative}
.client-avatar{position:absolute;bottom:-20px;left:16px;width:48px;height:48px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.client-body{padding:28px 16px 14px}
.client-name{font-size:15px;font-weight:600;margin-bottom:4px}
.client-industry{font-size:12px;color:var(--text2)}
.client-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.client-tag{font-size:10px;padding:2px 8px;background:#e0e7ff;color:#4338ca;border-radius:3px}
.client-footer{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-top:1px solid #f3f4f6}
.client-mutual{font-size:11px;color:var(--success);font-weight:600}

/* Article Card */
.article-card{background:#fff;margin:10px 12px;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer}
.article-card:active{background:#f9fafb}
.article-title{font-size:15px;font-weight:600;padding:12px 14px 6px;color:var(--text)}
.article-meta{font-size:11px;color:var(--text2);padding:0 14px 12px}

/* Service Card */
.svc-card{background:#fff;margin:10px 12px;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.svc-title{font-size:14px;font-weight:600;margin-bottom:6px}
.svc-desc{font-size:12px;color:var(--text2);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.svc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.svc-tag{font-size:10px;padding:2px 6px;background:#ecfdf5;color:#059669;border-radius:3px}
.svc-footer{display:flex;justify-content:space-between;align-items:center}
.svc-price{font-size:15px;font-weight:700;color:var(--danger)}
.svc-btn{background:var(--primary);color:#fff;font-size:12px;padding:6px 16px;border:none;border-radius:16px}

/* Detail Page */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:1000;overflow-y:auto;display:none}
.detail-overlay.active{display:block}
.detail-header{position:sticky;top:0;background:#fff;padding:12px 16px;display:flex;align-items:center;border-bottom:1px solid var(--border);z-index:10}
.back-btn{font-size:20px;color:var(--text);cursor:pointer;margin-right:12px}
.detail-title{font-size:16px;font-weight:600}
.detail-content{padding:16px}
.detail-section{margin-bottom:20px}
.detail-section-title{font-size:15px;font-weight:600;margin-bottom:10px;padding-left:8px;border-left:3px solid var(--primary)}
.detail-text{font-size:14px;line-height:1.7;color:var(--text)}
.detail-price{font-size:24px;font-weight:700;color:var(--danger);margin:10px 0}

/* Wechat accounts */
.wa-card{background:#fff;margin:10px 12px;border-radius:12px;padding:14px;display:flex;gap:12px;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.wa-avatar{width:44px;height:44px;border-radius:8px;background:#f0f4ff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.wa-info{flex:1}
.wa-name{font-size:14px;font-weight:600}
.wa-meta{font-size:11px;color:var(--text2);margin-top:2px}
.wa-follow{font-size:12px;padding:5px 14px;border-radius:14px;border:none;font-weight:600}
.wa-follow.followed{background:#f3f4f6;color:#9ca3af}
.wa-follow.not-followed{background:var(--success);color:#fff}

/* Bottom Action */
.bottom-action{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;box-shadow:0 -2px 10px rgba(0,0,0,.06);display:flex;gap:8px;z-index:100}
.btn-primary{flex:1;background:var(--primary);color:#fff;border:none;padding:12px;border-radius:24px;font-size:14px;font-weight:600}
.btn-outline{flex:1;background:#fff;color:var(--primary);border:1px solid var(--primary);padding:12px;border-radius:24px;font-size:14px;font-weight:600}

/* Footer */
.h5-footer{text-align:center;padding:24px 16px 40px;color:#9ca3af;font-size:11px}
.h5-footer a{color:var(--primary)}
[data-theme="dark"]{--primary:#3b82f6;--primary-dark:#2563eb;--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--text2:#94a3b8;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6}
[data-theme="dark"] .h5-header{background:linear-gradient(135deg,#1e293b,#0f172a)}
[data-theme="dark"] .nav-tabs{background:#1e293b;border-color:#334155}
[data-theme="dark"] .nav-tab{color:#94a3b8}
[data-theme="dark"] .nav-tab.active{color:#3b82f6}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:#0f172a;color:#e2e8f0;border-color:#334155}
[data-theme="dark"] .stat-box{background:#1e293b}
</style>
<script>
(function(){
  var isLocal = location.hostname.includes("localhost") || location.hostname.includes("127.0.0.1") || location.hostname.includes("0.0.0.0");
  if (!isLocal) {
    window.__DEMO_MODE__ = true;
    var origFetch = window.fetch;
    window.fetch = function(url, opts) {
      if (typeof url === "string" && (url.includes("/api/") || url.includes("/api"))) {
        return Promise.resolve(new Response(JSON.stringify({list:[],data:[],items:[],total:0,ok:true,stats:{},config:{},dashboard:{}}), {
          status: 200, headers: {"Content-Type":"application/json"}
        }));
      }
      return origFetch.apply(this, arguments);
    };
    document.addEventListener("DOMContentLoaded", function(){
      var b = document.createElement("div");
      b.style.cssText = "position:fixed;top:0;left:0;right:0;background:#d4a017;color:#fff;text-align:center;font-size:12px;padding:6px;z-index:99999;font-family:sans-serif";
      b.innerHTML = '演示模式 · API数据需本地后端运行 · <a href="https://github.com/sgmt-taojing/shuzhi-workshop-v4" style="color:#fff;text-decoration:underline">GitHub</a>';
      document.body.insertBefore(b, document.body.firstChild);
      var h = document.createElement("style");
      h.textContent = "body{padding-top:32px!important}";
      document.head.appendChild(h);
    });
  }
})();
</script>
</head>
<body>

<!-- Header -->
<div class="h5-header">
  <div class="h5-logo" id="h5Logo">${SITE_CONFIG.site_icon||'🏭'} ${SITE_CONFIG.site_name||'数造工坊'} <span id="h5ThemeToggle" onclick="toggleH5Theme()" style="cursor:pointer;font-size:14px;opacity:.6;margin-left:8px">🌙</span></div>
  <div class="h5-slogan" id="h5Slogan">${SITE_CONFIG.site_slogan||'企业数字化转型一站式服务平台'}</div>
</div>

<!-- Nav Tabs -->
<div class="nav-tabs" id="navTabs">
  <div class="nav-tab active" data-page="home">🏠 首页</div>
  <div class="nav-tab" data-page="policy">📜 政策库</div>
  <div class="nav-tab" data-page="products">📦 产品库</div>
  <div class="nav-tab" data-page="articles">📖 数字洞察</div>
  <div class="nav-tab" data-page="clients">🏢 客户展示</div>
  <div class="nav-tab" data-page="service">🤝 服务撮合</div>
  <div class="nav-tab" data-page="mall">🛒 商城</div>
  <div class="nav-tab" data-page="groupbuy">👥 团购</div>
  <div class="nav-tab" data-page="wechat">📱 公众号</div>
</div>

<!-- Pages -->
<div id="page-home" class="page active"></div>
<div id="page-policy" class="page"></div>
<div id="page-products" class="page"></div>
<div id="page-articles" class="page"></div>
<div id="page-clients" class="page"></div>
<div id="page-service" class="page"></div>
<div id="page-mall" class="page"></div>
<div id="page-groupbuy" class="page"></div>
<div id="page-wechat" class="page"></div>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-header">
    <span class="back-btn" onclick="closeDetail()">‹</span>
    <span class="detail-title" id="detailTitle">详情</span>
  </div>
  <div class="detail-content" id="detailContent"></div>
  <div class="bottom-action" id="detailAction" style="display:none"></div>
</div>

<!-- Footer -->
<div class="h5-footer">
  <p id="h5Footer">数造工坊 · 数字化转型服务平台</p>
  <p style="margin-top:4px"><a href="javascript:void(0)" onclick="switchPage('home')">回到首页</a></p>
</div>

<script>
const API_BASE = window.location.origin + '/api';

function toggleH5Theme(){var t=document.documentElement.getAttribute('data-theme');if(t==='dark'){document.documentElement.removeAttribute('data-theme');localStorage.setItem('h5_theme','light');var e=document.getElementById('h5ThemeToggle');if(e)e.textContent='🌙'}else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('h5_theme','dark');var e=document.getElementById('h5ThemeToggle');if(e)e.textContent='☀️'}}
(function(){var t=localStorage.getItem('h5_theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');setTimeout(function(){var e=document.getElementById('h5ThemeToggle');if(e)e.textContent='☀️'},500)}})();

async function api(path, opts) {
  const r = await fetch(API_BASE + path, opts ? { ...opts, headers: { 'Content-Type': 'application/json' } } : {});
  return r.json();
}

// 全局配置（运行时动态加载，可通过后台修改）
let SITE_CONFIG = {};
async function loadSiteConfig() {
  try { const data = await api('/config'); SITE_CONFIG = data.config || {}; } catch(e) {}
}

function $(s) { return document.querySelector(s); }
function $$(s) { return document.querySelectorAll(s); }

// --- Nav ---
$$('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => switchPage(tab.dataset.page));
});

function switchPage(page) {
  $$('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.page === page));
  $$('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + page));
  // Scroll to top
  window.scrollTo(0, 0);
  // Load content
  if (page === 'home') loadHome();
  else if (page === 'policy') loadPolicy();
  else if (page === 'products') loadProducts();
  else if (page === 'articles') loadArticles();
  else if (page === 'clients') loadClients();
  else if (page === 'service') loadService();
  else if (page === 'mall') loadMall();
  else if (page === 'groupbuy') loadGroupBuy();
  else if (page === 'wechat') loadWechat();
}

// --- Detail ---
function openDetail(title, content, actionHtml) {
  $('#detailTitle').textContent = title;
  $('#detailContent').innerHTML = content;
  if (actionHtml) {
    $('#detailAction').innerHTML = actionHtml;
    $('#detailAction').style.display = 'flex';
  } else {
    $('#detailAction').style.display = 'none';
  }
  $('#detailOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeDetail() {
  $('#detailOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ==================== 首页 ====================
async function loadHome() {
  const el = $('#page-home');
  el.innerHTML = '<div class="skel skel-card"></div><div class="skel skel-card"></div><div class="skel skel-line"></div><div class="skel skel-line short"></div>';
  try {
    const [dashData, products, policies, articles, charityData] = await Promise.all([
      api('/admin/dashboard').catch(() => ({})),
      api('/products?page=1&limit=4').catch(() => ({list:[]})),
      api('/policies?page=1&limit=3').catch(() => ({list:[]})),
      api('/articles?page=1&limit=3').catch(() => ({list:[]})),
      api('/charity/dashboard').catch(() => ({}))
    ]);

    const prodList = products.list || products || [];
    const polList = policies.list || policies || [];
    const artList = articles.list || articles || [];

    el.innerHTML = `
      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${dashData.products || prodList.length || 16}</div><div class="stat-label">数字化产品</div></div>
        <div class="stat-box"><div class="stat-num">${dashData.clients || 32}</div><div class="stat-label">服务客户</div></div>
        <div class="stat-box"><div class="stat-num">${polList.length || 17}</div><div class="stat-label">政策收录</div></div>
        <div class="stat-box"><div class="stat-num">${artList.length}</div><div class="stat-label">数字洞察</div></div>
      </div>

      <!-- Quick Entries -->
      <div style="display:flex;flex-wrap:wrap;gap:8px;padding:12px">
        <div style="flex:1;min-width:45%;background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:10px;padding:14px;cursor:pointer" onclick="switchPage('products')">
          <div style="font-size:24px">📦</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">数字化产品库</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">16个标准方案</div>
        </div>
        <div style="flex:1;min-width:45%;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:10px;padding:14px;cursor:pointer" onclick="switchPage('policy')">
          <div style="font-size:24px">📜</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">政策追踪</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">国家/山东/宁夏</div>
        </div>
        <div style="flex:1;min-width:45%;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:10px;padding:14px;cursor:pointer" onclick="switchPage('service')">
          <div style="font-size:24px">🤝</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">服务撮合</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">供需智能匹配</div>
        </div>
        <div style="flex:1;min-width:45%;background:linear-gradient(135deg,#f3e8ff,#e9d5ff);border-radius:10px;padding:14px;cursor:pointer" onclick="switchPage('mall')">
          <div style="font-size:24px">🛒</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">客户商城</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">生鲜特产·扶贫助农</div>
        </div>
      </div>

        <div style="flex:1;min-width:45%;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:10px;padding:14px;cursor:pointer" onclick="switchPage('groupbuy')">
          <div style="font-size:24px">👥</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">团购专区</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">食堂·福利·供销社</div>
        </div>

      <!-- Charity Banner -->
      <div id="charityBanner" style="margin:12px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:12px;padding:14px;cursor:pointer" onclick="switchPage('mall')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:14px;font-weight:700;color:#92400e">🤝 扶贫助农 · 慈善捐赠</div>
            <div style="font-size:12px;color:#92400e;margin-top:3px" id="charityBannerText">购买生鲜特产，自动签发电子捐赠证书</div>
          </div>
          <span style="font-size:28px">❤️</span>
        </div>
      </div>

      <!-- Latest Products -->
      <div style="padding:0 12px;margin-top:8px">
        <div style="font-size:15px;font-weight:600;margin-bottom:10px">热门产品</div>
      </div>
      <div class="prod-grid">
        ${prodList.slice(0, 4).map(p => `
          <div class="prod-card" onclick="showProductDetail(${p.id})">

let policyFilter = { level: '', category: '', search: '' };

async function loadPolicy() {
  const el = $('#page-policy');
  el.innerHTML = '<div class="loading">加载中...</div>';
  try {
    let url = '/policies?page=1&limit=100';
    if (policyFilter.level) url += '&level=' + policyFilter.level;
    if (policyFilter.category) url += '&category=' + policyFilter.category;
    const data = await api(url);
    let rows = data.list || data || [];
    
    // 客户端搜索（标题/摘要/标签）
    if (policyFilter.search) {
      const kw = policyFilter.search.toLowerCase();
      rows = rows.filter(r => 
        (r.title||'').toLowerCase().includes(kw) || 
        (r.summary||'').toLowerCase().includes(kw) ||
        (r.subtitle||'').toLowerCase().includes(kw) ||
        JSON.stringify(r.tags||[]).toLowerCase().includes(kw)
      );
    }
    
    const levelMap = {national:'国家',shandong:'山东',ningxia:'宁夏'};
    const levelClass = {national:'level-national',shandong:'level-shandong',ningxia:'level-ningxia'};
    const catMap = {digital:'数字化',tax:'财税',industry:'产业',talent:'人才',other:'其他'};

    el.innerHTML = `
      <div class="filter-bar">
        <div class="filter-chip ${!policyFilter.level?'active':''}" onclick="filterPolicy('level','')">全部</div>
        <div class="filter-chip ${policyFilter.level==='national'?'active':''}" onclick="filterPolicy('level','national')">国家级</div>
        <div class="filter-chip ${policyFilter.level==='shandong'?'active':''}" onclick="filterPolicy('level','shandong')">山东省</div>
        <div class="filter-chip ${policyFilter.level==='ningxia'?'active':''}" onclick="filterPolicy('level','ningxia')">宁夏</div>
      </div>
      <div class="filter-bar">
        <div class="filter-chip ${!policyFilter.category?'active':''}" onclick="filterPolicy('category','')">全部分类</div>
        <div class="filter-chip ${policyFilter.category==='digital'?'active':''}" onclick="filterPolicy('category','digital')">数字化</div>
        <div class="filter-chip ${policyFilter.category==='tax'?'active':''}" onclick="filterPolicy('category','tax')">财税</div>
        <div class="filter-chip ${policyFilter.category==='industry'?'active':''}" onclick="filterPolicy('category','industry')">产业</div>
        <div class="filter-chip ${policyFilter.category==='talent'?'active':''}" onclick="filterPolicy('category','talent')">人才</div>
      </div>
      <div style="padding:10px 12px;background:#fff;border-bottom:1px solid var(--border)">
        <input id="policySearchInput" value="${policyFilter.search}" placeholder="搜索省份/城市/关键词..." style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:20px;font-size:13px" onkeyup="if(event.key==='Enter')filterPolicy('search',this.value)">
      </div>
      <div id="policyList"></div>
    `;
    const listEl = $('#policyList');
    if (rows.length === 0) {
      listEl.innerHTML = '<div class="empty">暂无政策数据</div>';
    } else {
      listEl.innerHTML = rows.map(p => `
        <div class="policy-item" onclick="showPolicyDetail(${p.id})">
          <span class="policy-level ${levelClass[p.level]||''}">${levelMap[p.level]||p.level}</span>
          <span class="policy-cat">${catMap[p.category]||p.category}</span>
          <div class="policy-title">${p.title}</div>
          <div class="policy-meta">${p.publish_date || ''} · ${p.source || p.issuing_authority || ''}</div>
        </div>
      `).join('');
    }
  } catch(e) {
    el.innerHTML = '<div class="empty">加载失败</div>';
  }
}

function filterPolicy(type, val) {
  policyFilter[type] = val;
  loadPolicy();
}

function randomGradient(seed) {
  const gradients = [
    '#3b82f6,#6366f1','#22c55e,#16a34a','#f59e0b,#f97316','#8b5cf6,#a855f7','#06b6d4,#0891b2','#ef4444,#f97316'

  return gradients[seed % gradients.length];
}

async function initiateTrade(clientId, clientName) {
  openOverlay('发起合作意向', `
    <div class="form-group"><label class="form-label">您的需求</label>
      <select class="form-select" id="trade-type">
        <option value="development">软件开发</option>
        <option value="digital">数字化转型</option>
        <option value="consulting">咨询服务</option>
        <option value="operations">运维服务</option>
        <option value="other">其他</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">需求标题</label>
      <input class="form-input" id="trade-title" placeholder="如：希望采购${clientName}的产品/服务">
    </div>
    <div class="form-group"><label class="form-label">预算范围</label>
      <div style="display:flex;gap:8px">
        <input class="form-input" id="trade-min" type="number" placeholder="最低" style="flex:1">
        <input class="form-input" id="trade-max" type="number" placeholder="最高" style="flex:1">
      </div>
    </div>
    <div class="form-group"><label class="form-label">需求描述</label>
      <textarea class="form-textarea" id="trade-desc" placeholder="描述您的具体需求..."></textarea>
    </div>
    <div class="form-group"><label class="form-label">您的姓名</label>
      <input class="form-input" id="trade-name" placeholder="姓名">
    </div>
    <div class="form-group"><label class="form-label">手机号</label>
      <input class="form-input" id="trade-phone" type="tel" placeholder="手机号">
    </div>
    <button class="btn btn-primary" onclick="submitTrade(${clientId}, '${clientName.replace(/'/g,'')}')">提交需求，进入撘合跟踪</button>
  `);
  $('#overlayAction').style.display = 'none';
}

async function submitTrade(clientId, clientName) {
  const title = $('#trade-title').value.trim();
  const desc = $('#trade-desc').value.trim();
  const name = $('#trade-name').value.trim();
  const phone = $('#trade-phone').value.trim();
  if (!title || !desc || !name || !phone) { toast('请填写完整信息'); return; }
  const body = {
    user_name: name + '（来自客户展示页）',
    title: title,
    category: $('#trade-type').value,
    budget_min: parseFloat($('#trade-min').value) || 0,
    budget_max: parseFloat($('#trade-max').value) || 0,
    description: desc + '\n\n意向客户：' + clientName + '（ID:'+clientId+'）',
    requirements: [clientName+'产品/服务'],
    deadline: '',
    location: ''
  };
  try {
    const data = await api('/services/demands', { method: 'POST', body: JSON.stringify(body) });
    toast('需求已提交，进入撘合跟踪！');
    closeOverlay();
    switchPage('service');
  } catch(e) { toast('提交失败'); }
}

                ${p.donation_enabled === 1 ? '<span style="font-size:9px;background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:3px">❤️捐赠'+p.donation_percent+'%</span>' : ''}

            </div>
          </div>`;
        }).join('') || ''}
      </div>
      ${rows.length === 0 ? '<div class="empty">暂无商品</div>' : ''}
    `;
  } catch(e) {
    el.innerHTML = '<div class="empty">加载失败</div>';
  }
}

async function showBuyerDetail(buyerId) {
  openDetail('采购方详情', '<div class="loading">加载中...</div>');
  try {
    const [buyersData, buysData] = await Promise.all([
      api('/group-buy/buyers'),
      api('/group-buy/buys?page=1&limit=50')
    ]);
    const buyer = (buyersData.list||[]).find(b => b.id === buyerId);
    const buyerBuys = (buysData.list||[]).filter(g => g.buyer_id === buyerId);
    const bTypeMap = {welfare:'企业福利',canteen:'食堂',supply:'供销社',poverty:'扶贫机构'};
    if (!buyer) { $('#detailContent').innerHTML = '<div class="empty">未找到</div>'; return; }
    
    const totalQty = buyerBuys.reduce((s,g) => s + (g.current_qty||0), 0);
    const totalAmount = buyerBuys.reduce((s,g) => s + (g.current_qty||0)*(g.group_price||0), 0);
    
    $('#detailContent').innerHTML = `
      <div class="detail-section">
        <h2 style="font-size:18px;margin-bottom:6px">${buyer.name}</h2>
        <div style="font-size:13px;color:#6b7280;margin-bottom:10px">${bTypeMap[buyer.type]||buyer.type} · 员工${buyer.employee_count||0}人</div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;background:#f9fafb;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:700;color:#3b82f6">${buyerBuys.length}</div><div style="font-size:10px;color:#6b7280">团购活动</div></div>
          <div style="flex:1;background:#f9fafb;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:700;color:#22c55e">${totalQty}</div><div style="font-size:10px;color:#6b7280">采购总量</div></div>
          <div style="flex:1;background:#f9fafb;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:700;color:#f59e0b">¥${(totalAmount/10000).toFixed(1)}万</div><div style="font-size:10px;color:#6b7280">采购总额</div></div>
        </div>
      </div>
      ${buyer.description ? '<div class="detail-section"><div class="detail-section-title">机构简介</div><div class="detail-text">'+buyer.description+'</div></div>' : ''}
      <div class="detail-section"><div class="detail-section-title">联系方式</div><div class="detail-text">联系人：'+buyer.contact_name+'<br>电话：'+buyer.contact_phone+'<br>地址：'+(buyer.address||'-')+'</div></div>
      ${buyerBuys.length ? '<div class="detail-section"><div class="detail-section-title">团购活动（'+buyerBuys.length+'）</div>'+buyerBuys.map(g => '<div style="background:#f9fafb;border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer" onclick="closeOverlay();showGroupBuyDetail('+g.id+')"><div style="font-weight:600;font-size:13px">'+g.title+'</div><div style="font-size:12px;color:#6b7280;margin-top:3px">'+g.product_title+' · ¥'+g.group_price+' · 已团'+g.current_qty+'份</div></div>').join('')+'</div>' : '<div class="detail-section"><div class="detail-section-title">暂无团购活动</div></div>'}
    `;
    $('#overlayAction').style.display = 'none';
  } catch(e) { $('#detailContent').innerHTML = '<div class="empty">加载失败</div>'; }
}

async function showGroupBuyDetail(id) {
  openDetail('团购详情', '<div class="loading">加载中...</div>');
  try {
    const g = await api('/group-buy/buys/' + id);
    const typeMap = {welfare:'企业福利',canteen:'食堂',supply:'供销社',poverty:'扶贫机构'};
    const typeIcon = {welfare:'🏢',canteen:'🍽️',supply:'🏪',poverty:'🤝'};
    const progress = g.progress || 0;
    const progColor = progress >= 100 ? '#22c55e' : progress >= 50 ? '#f59e0b' : '#3b82f6';
    const donationAmount = g.donation_enabled === 1 ? Math.round(g.group_price * (g.donation_percent || 0) / 100 * 100) / 100 : 0;
    const savePerUnit = (g.original_price || 0) - (g.group_price || 0);
    const totalSaved = savePerUnit * (g.current_qty || 0);
    const totalDonation = donationAmount * (g.current_qty || 0);
    const product = g.product;
    
    $('#detailContent').innerHTML = `
      <div class="detail-section">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
          <h2 style="font-size:16px;flex:1">${typeIcon[g.buyer_type]||'👥'} ${g.title}</h2>
          ${progress >= 100 ? '<span style="background:#d1fae5;color:#059669;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600">✅ 已成团</span>' : '<span style="background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600">🔥 团购中</span>'}
        </div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:12px">采购方：${g.buyer_name||'-'}（${typeMap[g.buyer_type]||g.buyer_type}）· 截止 ${g.end_date||'-'}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span style="font-size:28px;font-weight:700;color:#ef4444">¥${g.group_price}</span>
          <div>
            <div style="font-size:13px;color:#9ca3af;text-decoration:line-through">原价 ¥${g.original_price}</div>
            <div style="font-size:12px;color:#059669;font-weight:600">省${g.discount}% · 每份省¥${savePerUnit}</div>
          </div>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${g.origin ? '<span style="font-size:11px;background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:4px">📍 '+g.origin+'</span>' : ''}
          ${g.poverty_alleviation === 1 ? '<span style="font-size:11px;background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:4px">🚜 扶贫产品</span>' : ''}
          ${g.donation_enabled === 1 ? '<span style="font-size:11px;background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:4px">❤️ 捐赠'+g.donation_percent+'%</span>' : ''}
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">团购进度</div>
        <div style="background:#e5e7eb;height:12px;border-radius:6px;overflow:hidden;margin-bottom:8px"><div style="width:${progress}%;height:100%;background:${progColor};border-radius:6px;transition:width .3s"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px">
          <span>已团 <strong style="color:${progColor}">${g.current_qty}</strong> / 最低${g.min_qty}${g.max_qty>0?' (上限'+g.max_qty+')':''}</span>
          <span style="color:${progColor};font-weight:700">${progress}%</span>
        </div>
        <div style="display:flex;gap:8px;font-size:11px;color:#6b7280;flex-wrap:wrap">
          <span>👥 ${g.participants}人参团</span>
          <span>💰 累计¥${(g.current_qty*g.group_price).toLocaleString()}</span>
          <span>💸 已省¥${totalSaved.toLocaleString()}</span>
          ${totalDonation > 0 ? '<span>❤️ 捐赠¥'+Math.round(totalDonation).toLocaleString()+'</span>' : ''}
        </div>
      </div>
      ${g.description ? '<div class="detail-section"><div class="detail-section-title">团购说明</div><div class="detail-text" style="white-space:pre-wrap;line-height:1.8">'+g.description+'</div></div>' : ''}
      ${product && product.manufacturer ? '<div style="background:#f0f9ff;border-radius:12px;padding:14px;margin:12px 0"><div style="font-size:13px;font-weight:700;color:#1e40af;margin-bottom:8px">🔍 产品溯源</div><div style="font-size:12px;color:#4b5563;line-height:1.8">'+(product.manufacturer?'生产方：'+product.manufacturer+'<br>':'')+(product.manufacturer_addr?'产地：'+product.manufacturer_addr+'<br>':'')+(product.quality_cert?'认证：'+product.quality_cert+'<br>':'')+(product.logistics_company?'物流：'+product.logistics_company+'（'+(product.logistics_mode||'')+'）<br>':'')+(product.delivery_time?'发货：'+product.delivery_time+'<br>':'')+(product.shelf_life?'保质期：'+product.shelf_life:'')+'</div></div>' : ''}
      ${g.donation_enabled === 1 ? '<div style="background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:12px;padding:14px;margin-bottom:12px"><div style="font-size:14px;font-weight:700;color:#92400e;margin-bottom:4px">❤️ 慈善捐赠</div><div style="font-size:12px;color:#92400e;line-height:1.6">每份捐赠销售额的<strong>'+g.donation_percent+'%</strong>（约¥'+donationAmount+'）给「'+g.donation_org+'」<br>参团购买自动签发电子捐赠证书</div></div>' : ''}
      ${g.tags && g.tags.length ? '<div class="detail-section"><div class="detail-section-title">标签</div><div>'+g.tags.map(t=>'<span class="prod-tag">'+t+'</span>').join('')+'</div></div>' : ''}
      ${g.orders && g.orders.length ? '<div class="detail-section"><div class="detail-section-title">参团记录（'+g.orders.length+'人 '+g.orders.reduce((s,o)=>s+o.quantity,0)+'份）</div>'+g.orders.map(o=>'<div style="background:#f9fafb;border-radius:8px;padding:10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center"><div><span style="font-weight:600;font-size:13px">'+o.buyer_name+'</span><span style="font-size:11px;color:#6b7280;margin-left:8px">'+(o.buyer_org||'')+'</span></div><div style="text-align:right"><span style="font-size:13px;font-weight:600">'+o.quantity+'份</span><span style="font-size:11px;color:#6b7280;margin-left:6px">¥'+o.total_price+'</span></div></div>').join('')+'</div>' : ''}
    `;
    
    if (g.status === 'open') {
      $('#overlayAction').innerHTML = '<button class="btn-primary" onclick="joinGroupBuy('+id+')">👥 立即参团 · ¥'+g.group_price+'起</button>';
      $('#overlayAction').style.display = 'flex';
    } else {
      $('#overlayAction').innerHTML = '<div style="text-align:center;color:#6b7280;font-size:13px;width:100%">团购已结束</div>';
      $('#overlayAction').style.display = 'flex';
    }
  } catch(e) {
    $('#detailContent').innerHTML = '<div class="empty">加载失败</div>';
  }
}

function joinGroupBuy(id) {
  openDetail('参团下单', `
    <div style="background:#eff6ff;border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px;color:#1e40af;line-height:1.6">📋 填写参团信息，提交后系统自动计算价格和捐赠金额。含捐赠产品参团成功后自动签发电子证书。</div>
    <div class="form-group"><label class="form-label">姓名 *</label><input class="form-input" id="gb-name" placeholder="您的姓名"></div>
    <div class="form-group"><label class="form-label">手机号 *</label><input class="form-input" id="gb-phone" type="tel" placeholder="手机号"></div>
    <div class="form-group"><label class="form-label">单位/组织</label><input class="form-input" id="gb-org" placeholder="所在单位（选填）"></div>
    <div class="form-group"><label class="form-label">数量 *</label><input class="form-input" id="gb-qty" type="number" value="1" min="1" onchange="calcGbPrice(${id})"></div>
    <div class="form-group"><label class="form-label">交货备注</label><input class="form-input" id="gb-remark" placeholder="如：工作日送达、需要发票等"></div>
    <div id="gbPriceCalc" style="background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:14px;font-size:13px;color:#374151"></div>
    <button class="btn btn-primary" onclick="submitGroupBuy(${id})">确认参团</button>
  `);
  $('#overlayAction').style.display = 'none';
  calcGbPrice(id);
}

async function calcGbPrice(id) {
  try {
    const qty = parseInt($('#gb-qty').value) || 1;
    const g = await api('/group-buy/buys/' + id);
    if (!g || g.error) return;
    const total = g.group_price * qty;
    const save = (g.original_price - g.group_price) * qty;
    const don = g.donation_enabled === 1 ? Math.round(total * g.donation_percent / 100 * 100) / 100 : 0;
    $('#gbPriceCalc').innerHTML = '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>团购价</span><span>¥'+g.group_price+' × '+qty+' = <strong>¥'+total+'</strong></span></div><div style="display:flex;justify-content:space-between;color:#059669;margin-bottom:4px"><span>团购节省</span><span>¥'+save+'</span></div>'+(don > 0 ? '<div style="display:flex;justify-content:space-between;color:#92400e"><span>慈善捐赠（'+g.donation_percent+'%）</span><span>¥'+don+' → '+g.donation_org+'</span></div>' : '');
  } catch(e) {}
}

async function submitGroupBuy(id) {
  const name = $('#gb-name').value.trim();
  const phone = $('#gb-phone').value.trim();
  if (!name || !phone) { toast('请填写姓名和手机号'); return; }
  const body = {
    buyer_name: name,
    buyer_phone: phone,
    buyer_org: $('#gb-org').value.trim(),
    quantity: parseInt($('#gb-qty').value) || 1,
    remark: $('#gb-remark').value.trim()
  };
  try {
    const data = await api('/group-buy/buys/'+id+'/join', { method: 'POST', body: JSON.stringify(body) });
    const cert = data.certificate;
    if (cert) {
      openDetail('参团成功！', `
        <div style="text-align:center;padding:20px">
          <div style="font-size:48px;margin-bottom:12px">🎉</div>
          <h2 style="font-size:18px;margin-bottom:8px">参团成功！</h2>
          <div style="font-size:14px;color:#6b7280;margin-bottom:16px">${data.order.quantity}份 · ¥${data.order.total_price}<br>当前已团${data.group_buy.current_qty}份，${data.group_buy.participants}人参团</div>
          <div style="background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:16px">
            <div style="font-size:14px;font-weight:700;color:#92400e;margin-bottom:6px">❤️ 慈善捐赠证书已签发</div>
            <div style="font-size:12px;color:#92400e;line-height:1.6">证书编号：${cert.cert_no}<br>捐赠金额：¥${cert.donation_amount} → ${cert.donation_org}<br>${cert.message}</div>
          </div>
          <button class="btn btn-primary" onclick="window.open('${API_BASE}/charity/certificates/${cert.cert_no}/html','_blank')">📜 查看电子证书</button>
          <button class="btn btn-outline" style="margin-top:8px" onclick="closeOverlay();loadGroupBuy()">返回团购列表</button>
        </div>
      `);
    } else {
      toast('参团成功！');
      closeOverlay();
      loadGroupBuy();
    }
  } catch(e) {
    toast('参团失败');
  }
}

// ==================== 公众号互粉 ====================
async function loadWechat() {
  const el = $('#page-wechat');
  el.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await api('/wechat/accounts');
    const rows = data || [];
    const ourAccounts = rows.filter(r => r.type === 'our');
    const clientAccounts = rows.filter(r => r.type === 'client');
    const totalFollowers = rows.reduce((s,r) => s + (r.followers||0), 0);

    el.innerHTML = `
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${rows.length}</div><div class="stat-label">公众号</div></div>
        <div class="stat-box"><div class="stat-num">${clientAccounts.length}</div><div class="stat-label">客户公众号</div></div>
        <div class="stat-box"><div class="stat-num">${totalFollowers.toLocaleString()}</div><div class="stat-label">总粉丝</div></div>
      </div>
      <div style="padding:0 12px;margin-bottom:8px;font-size:14px;font-weight:600">我方公众号</div>
      ${ourAccounts.map(a => `
        <div class="wa-card">
          <div class="wa-avatar">📢</div>
          <div class="wa-info">
            <div class="wa-name">${a.name}</div>
            <div class="wa-meta">${a.industry||''} · ${(a.followers||0).toLocaleString()} 粉丝</div>
          </div>
          <button class="wa-follow followed" onclick="toggleFollow(${a.id},this)">已关注</button>
        </div>
      `).join('')}
      <div style="padding:12px;margin-bottom:8px;font-size:14px;font-weight:600">客户公众号（互粉大厅）</div>
      ${clientAccounts.map(a => `
        <div class="wa-card">
          <div class="wa-avatar">${(a.name||'?').charAt(0)}</div>
          <div class="wa-info">
            <div class="wa-name">${a.name}</div>
            <div class="wa-meta">${a.industry||''} · ${(a.followers||0).toLocaleString()} 粉丝 · ${a.follow_status==='mutual'?'互关':a.follow_status==='oneway'?'单向':'未关联'}</div>
          </div>
          <button class="wa-follow ${a.follow_status==='mutual'?'followed':'not-followed'}" onclick="toggleFollow(${a.id},this)">${a.follow_status==='mutual'?'互关中':'关注'}</button>
        </div>
      `).join('')}
      <div style="padding:12px;margin-top:16px">
        <div style="background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:12px;padding:16px">
          <div style="font-size:14px;font-weight:600;margin-bottom:6px">⭐ 互粉福利</div>
          <div style="font-size:12px;color:#92400e;line-height:1.6">客户公众号互相关注，形成互助增长网络。平台每周评选「星级客户」做专属推荐，优质内容可一键推送到公众号做宣传。</div>
        </div>
      </div>
    `;
  } catch(e) {
    el.innerHTML = '<div class="empty">加载失败</div>';
  }
}

function toggleFollow(id, btn) {
  if (btn.classList.contains('followed')) {
    btn.classList.remove('followed');
    btn.classList.add('not-followed');
    btn.textContent = '关注';
    showToast('已取消关注');
  } else {
    btn.classList.remove('not-followed');
    btn.classList.add('followed');
    btn.textContent = '已关注';
    showToast('关注成功！');
  }
}

// --- Utility ---
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:9999;pointer-events:none';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function contactUs(msg) {
  showToast('已收到您的咨询需求，客服将尽快联系您');
  try { api('/contact', { method: 'POST', body: JSON.stringify({ name: 'H5访客', phone: '00000000000', demand: msg, source: 'wechat_h5' }) }); } catch(e) {}
}
